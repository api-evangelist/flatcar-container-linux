apis:
  - aid: flatcar-container-linux:nebraska-update-api
    name: Flatcar Nebraska Update API
    description: >-
      Nebraska is the update management server for Flatcar Container Linux.
      It exposes a REST API for managing update applications, packages,
      channels, groups, instances, and activity. Flatcar instances poll
      Nebraska using the Omaha protocol for controlled rollouts, version
      pinning, and update monitoring across fleets of Flatcar nodes.
