aid: flatcar-container-linux
name: Flatcar Container Linux
description: >-
  Flatcar Container Linux is a CNCF incubating minimal, immutable Linux
  distribution designed for running containers. It provides automatic
  atomic updates through the Nebraska update server, ensuring nodes stay
  secure and consistent. Flatcar supports Kubernetes deployments on bare
  metal, cloud, and virtual environments with a focus on security and
  operational simplicity.
